<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Washmen Ops</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link id="hljs-theme" rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="shell">

  <!-- Icon Strip -->
  <div class="icon-strip">
    <button class="strip-btn" data-overlay="history" title="History">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
    </button>
    <button class="strip-btn" data-overlay="files" title="Files">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>
    </button>
    <button class="strip-btn" data-overlay="status" title="Status">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4m0 4h.01"/></svg>
    </button>
    <button class="strip-btn" data-overlay="notes" title="MVP Notes">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6"/><path d="M16 13H8m8 4H8"/></svg>
    </button>
    <div class="strip-divider"></div>
  </div>

  <!-- Left Panel -->
  <div class="left-panel" id="left-panel" style="width:35%">
    <!-- Top Bar -->
    <div class="top-bar">
      <div class="top-bar-left">
        <input class="project-name" id="project-name" value="Washmen Ops" spellcheck="false">
        <span class="branch-badge" id="branch-badge" style="display:none"></span>
        <div class="health-dots">
          <span class="h-dot" id="h-fe" title="Frontend"></span>
          <span class="h-dot" id="h-gw" title="Gateway"></span>
          <span class="h-dot" id="h-core" title="Core"></span>
        </div>
      </div>
      <div class="top-bar-right">
        <div class="mode-toggle" id="mode-toggle">
          <button class="mode-btn" data-mode="plan">Plan</button>
          <button class="mode-btn active" data-mode="build">Build</button>
        </div>
        <select class="model-select" id="model-select">
          <option value="sonnet">Sonnet</option>
          <option value="opus">Opus</option>
        </select>
      </div>
    </div>

    <!-- Chat + Overlays container -->
    <div style="flex:1;position:relative;overflow:hidden;display:flex;flex-direction:column;min-height:0">
    <!-- Chat Area -->
    <div class="chat-area" id="chat">
      <div class="welcome" id="welcome">
        <h2>What are you building?</h2>
        <p>Describe a feature and I'll build it across the frontend, API gateway, and core service.</p>
      </div>
      <div class="starters" id="starters"></div>
    </div>

    <!-- Overlays (slide over chat only) -->
    <div class="overlay" id="overlay-history">
      <div class="overlay-header"><h3>Version History</h3><button class="overlay-close">&times;</button></div>
      <div id="history-list"></div>
    </div>
    <div class="overlay" id="overlay-files">
      <div class="overlay-header"><h3>Files</h3><button class="overlay-close">&times;</button></div>
      <div id="file-tree"><!-- file tree populated by JS --></div>
    </div>
    <div class="overlay" id="overlay-status">
      <div class="overlay-header"><h3>Service Status</h3><button class="overlay-close">&times;</button></div>
      <div id="status-list"></div>
    </div>
    <div class="overlay" id="overlay-notes">
      <div class="overlay-header"><h3>MVP Notes</h3><button class="overlay-close">&times;</button></div>
      <div class="notes-area" id="notes-area">
        <textarea id="notes-editor" placeholder="MVP notes will appear here..."></textarea>
        <div class="notes-actions">
          <button class="notes-btn-gen" id="notes-gen">Generate</button>
          <button class="notes-btn-save" id="notes-save">Save</button>
          <button class="notes-btn-copy" id="notes-copy">Copy</button>
        </div>
      </div>
    </div>
    </div><!-- end chat + overlays container -->

    <!-- Prompt Queue -->
    <div class="queue" id="queue"></div>

    <!-- Input Dock -->
    <div class="input-dock" id="input-dock">
      <div class="input-row">
        <textarea id="input" placeholder="Describe what you want to build..." rows="1"></textarea>
        <button class="send-btn" id="send-btn" title="Send">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 19V5"/><path d="M5 12l7-7 7 7"/></svg>
        </button>
      </div>
      <div class="input-meta">
        <!-- Lovable-style bottom icon row -->
        <div class="input-icons">
          <button class="input-icon-btn" id="btn-attach" title="Attach file" disabled style="opacity:0.3">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          </button>
          <button class="input-icon-btn" id="edit-toggle" title="Visual edits">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v4m0 14v4M4.22 4.22l2.83 2.83m9.9 9.9l2.83 2.83M1 12h4m14 0h4M4.22 19.78l2.83-2.83m9.9-9.9l2.83-2.83"/></svg>
            <span>Visual edits</span>
          </button>
        </div>
        <div class="input-icons-right">
          <button class="input-icon-btn" id="btn-undo" title="Undo last change">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 10h10a5 5 0 015 5v2"/><path d="M3 10l4-4m-4 4l4 4"/></svg>
          </button>
          <button class="input-icon-btn" id="btn-restart" title="Restart services">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 4v6h6"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/></svg>
          </button>
          <button class="input-icon-btn" id="btn-mvp" title="Generate MVP Notes">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3m.08 4h.01"/></svg>
          </button>
        </div>
      </div>
    </div>

    <!-- Branch Lock (shown when on main) -->
    <div class="branch-lock" id="branch-lock" style="display:none">
      <span class="lock-icon">&#128274;</span>
      <input id="branch-input" placeholder="Type a feature name to create a branch...">
    </div>

    <!-- Budget Bar -->
    <div class="budget-bar">
      <span class="budget-label">API spend</span>
      <div class="budget-track"><div class="budget-fill" id="budget-fill"></div></div>
      <span class="budget-amount" id="budget-amount">$0 / $20</span>
    </div>
  </div>

  <!-- Resize Handle -->
  <div class="resize-handle" id="resize-handle"></div>

  <!-- Right Panel -->
  <div class="right-panel">
    <!-- Tabs — Lovable-style icon toolbar -->
    <div class="panel-tabs">
      <div class="tab-group-left">
        <!-- Code view -->
        <button class="panel-tab" data-tab="code" title="Code">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
        </button>
        <!-- Split view (future) -->
        <button class="panel-tab" data-tab="split" title="Split View" disabled style="opacity:0.3">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="12" y1="3" x2="12" y2="21"/></svg>
        </button>
      </div>
      <div class="tab-group-center">
        <!-- Preview (primary, pill style) -->
        <button class="panel-tab tab-pill active" data-tab="preview" title="Preview">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8m-4-4v4"/></svg>
          <span>Preview</span>
        </button>
      </div>
      <div class="tab-group-right">
        <!-- Console -->
        <button class="panel-tab" data-tab="console" title="Console">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
        </button>
        <!-- History/versions -->
        <button class="panel-tab" data-tab="versions" title="Version History" disabled style="opacity:0.3">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        </button>
        <!-- More -->
        <button class="panel-tab" data-tab="more" title="More" disabled style="opacity:0.3">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>
        </button>
      </div>
    </div>

    <!-- Preview Tab -->
    <div class="tab-content active" id="tab-preview">
      <div class="preview-bar">
        <button class="pbar-btn" id="preview-back" title="Back">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5m7-7l-7 7 7 7"/></svg>
        </button>
        <button class="pbar-btn" id="preview-refresh" title="Refresh">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 4v6h6"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/></svg>
        </button>
        <div class="preview-url">
          <span class="dot-green"></span>
          <input id="preview-url" value="" spellcheck="false">
        </div>
        <div class="device-btns">
          <button class="pbar-btn active" data-device="desktop" title="Desktop">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8m-4-4v4"/></svg>
          </button>
          <button class="pbar-btn" data-device="mobile" title="Mobile">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="2" width="14" height="20" rx="2"/><path d="M12 18h.01"/></svg>
          </button>
        </div>
        <button class="pbar-btn" id="visual-edit-btn" title="Visual Edit Mode">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </button>
      </div>
      <div class="preview-wrap" id="preview-wrap">
        <div class="preview-loading" id="preview-loading">
          <div class="ld"></div>
          <div class="status-lines" id="startup-status">Starting services...</div>
        </div>
        <iframe id="preview-frame" src="about:blank"></iframe>
      </div>
    </div>

    <!-- Code Tab -->
    <div class="tab-content" id="tab-code" style="flex-direction:row">
      <div class="code-sidebar" id="code-sidebar"></div>
      <div style="flex:1;display:flex;flex-direction:column;min-width:0">
        <div class="code-path" id="code-path">Select a file to view</div>
        <div class="code-view" style="flex:1;overflow:auto">
          <pre class="code-content" id="code-content"></pre>
        </div>
      </div>
    </div>

    <!-- Console Tab -->
    <div class="tab-content" id="tab-console" style="position:relative">
      <button class="console-clear" id="console-clear">Clear</button>
      <div class="console-view" id="console-view"></div>
    </div>
  </div>

</div>

<script type="module" src="app.js"></script>
</body>
</html>
