<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Gradient for the background -->
    <radialGradient id="bg-grad" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#0c0d10"/>
      <stop offset="100%" stop-color="#050508"/>
    </radialGradient>
    <!-- Accent glow -->
    <radialGradient id="glow" cx="50%" cy="45%" r="35%">
      <stop offset="0%" stop-color="rgba(51,209,122,0.15)"/>
      <stop offset="100%" stop-color="rgba(51,209,122,0)"/>
    </radialGradient>
    <!-- Filter for soft glow -->
    <filter id="soft-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bg-grad)"/>
  <circle cx="256" cy="256" r="256" fill="url(#glow)"/>

  <!-- Outer Arabic geometric octagonal frame -->
  <g transform="translate(256,256)" fill="none" stroke="#1e2028" stroke-width="2">
    <!-- Octagon border -->
    <polygon points="0,-195 138,-138 195,0 138,138 0,195 -138,138 -195,0 -138,-138"/>
    <!-- Inner decorative octagon -->
    <polygon points="0,-170 120,-120 170,0 120,120 0,170 -120,120 -170,0 -120,-120" stroke="#161820" stroke-width="1"/>
  </g>

  <!-- Islamic 8-point star pattern (outer ring) -->
  <g transform="translate(256,256)" fill="none" stroke-width="1.5" filter="url(#soft-glow)">
    <!-- 8-point star -->
    <polygon points="0,-165 42,-42 165,0 42,42 0,165 -42,42 -165,0 -42,-42"
             stroke="#33d17a" stroke-opacity="0.6"/>
    <!-- Rotated 45° overlay star -->
    <polygon points="0,-165 42,-42 165,0 42,42 0,165 -42,42 -165,0 -42,-42"
             stroke="#33d17a" stroke-opacity="0.3" transform="rotate(45)"/>
    <!-- Connecting arcs (Islamic interlace pattern) -->
    <path d="M0,-140 Q70,-70 140,0 Q70,70 0,140 Q-70,70 -140,0 Q-70,-70 0,-140"
          stroke="#33d17a" stroke-opacity="0.2" stroke-width="1"/>
    <path d="M-100,-100 Q0,-50 100,-100 Q50,0 100,100 Q0,50 -100,100 Q-50,0 -100,-100"
          stroke="#c69ff5" stroke-opacity="0.15" stroke-width="1"/>
  </g>

  <!-- Bot face / terminal icon in center -->
  <g transform="translate(256,256)">
    <!-- Head shape — rounded rectangle -->
    <rect x="-72" y="-80" width="144" height="130" rx="24" ry="24"
          fill="#0c0d10" stroke="#33d17a" stroke-width="2.5"/>

    <!-- Antenna -->
    <line x1="0" y1="-80" x2="0" y2="-108" stroke="#33d17a" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="0" cy="-112" r="5" fill="#33d17a"/>

    <!-- Eyes — terminal cursor style -->
    <g fill="#33d17a" filter="url(#soft-glow)">
      <!-- Left eye — block cursor -->
      <rect x="-38" y="-42" width="22" height="28" rx="4" fill="#33d17a" opacity="0.9"/>
      <!-- Right eye — block cursor -->
      <rect x="16" y="-42" width="22" height="28" rx="4" fill="#33d17a" opacity="0.9"/>
    </g>

    <!-- Mouth — terminal prompt -->
    <g stroke="#c69ff5" stroke-width="2.5" stroke-linecap="round" fill="none">
      <path d="M-30,20 L-15,32 L-30,44"/>
      <line x1="-5" y1="44" x2="30" y2="44"/>
    </g>

    <!-- Decorative ear pieces (Arabic-inspired) -->
    <g fill="none" stroke="#33d17a" stroke-width="1.5">
      <!-- Left ear — small geometric -->
      <path d="M-72,-30 Q-92,-30 -92,0 Q-92,20 -72,20" opacity="0.6"/>
      <circle cx="-92" cy="-5" r="3" fill="#33d17a" opacity="0.4"/>
      <!-- Right ear -->
      <path d="M72,-30 Q92,-30 92,0 Q92,20 72,20" opacity="0.6"/>
      <circle cx="92" cy="-5" r="3" fill="#33d17a" opacity="0.4"/>
    </g>
  </g>

  <!-- Arabic calligraphy-inspired decoration below the bot -->
  <g transform="translate(256,380)" fill="none" stroke-linecap="round">
    <!-- Bismillah-inspired decorative swirl (abstract, not actual text) -->
    <path d="M-60,0 C-40,-15 -20,-15 0,0 C20,15 40,15 60,0"
          stroke="#c69ff5" stroke-width="2" opacity="0.5"/>
    <path d="M-45,8 C-25,-5 -5,-5 15,8 C35,20 55,20 75,8"
          stroke="#c69ff5" stroke-width="1.5" opacity="0.3"/>
    <!-- Dots (Arabic diacritics style) -->
    <circle cx="-20" cy="-10" r="2.5" fill="#c69ff5" opacity="0.4"/>
    <circle cx="20" cy="-10" r="2.5" fill="#c69ff5" opacity="0.4"/>
    <circle cx="0" cy="18" r="2" fill="#c69ff5" opacity="0.3"/>
  </g>

  <!-- Small corner geometric ornaments (Islamic tile inspired) -->
  <g fill="none" stroke="#33d17a" stroke-width="1" opacity="0.2">
    <!-- Top-left -->
    <path d="M80,80 L110,80 L110,110" stroke-linecap="round"/>
    <path d="M85,85 L105,85 L105,105"/>
    <!-- Top-right -->
    <path d="M432,80 L402,80 L402,110" stroke-linecap="round"/>
    <path d="M427,85 L407,85 L407,105"/>
    <!-- Bottom-left -->
    <path d="M80,432 L110,432 L110,402" stroke-linecap="round"/>
    <path d="M85,427 L105,427 L105,407"/>
    <!-- Bottom-right -->
    <path d="M432,432 L402,432 L402,402" stroke-linecap="round"/>
    <path d="M427,427 L407,427 L407,407"/>
  </g>

  <!-- App name at bottom -->
  <text x="256" y="460" text-anchor="middle" fill="#6b7a8d" font-family="monospace" font-size="16" letter-spacing="3">
    SHAWKAT
  </text>
</svg>
