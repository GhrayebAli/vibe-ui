<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Washmen Ops - vibe-ui</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #0d1117; color: #c9d1d9; height: 100vh; display: flex; flex-direction: column; }

    /* Header */
    .header { display: flex; align-items: center; justify-content: space-between; padding: 8px 16px; background: #161b22; border-bottom: 1px solid #30363d; }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .header-title { font-size: 16px; font-weight: 600; color: #58a6ff; }
    .health-bar { display: flex; gap: 8px; }
    .health-dot { display: flex; align-items: center; gap: 4px; font-size: 11px; color: #8b949e; }
    .health-dot .dot { width: 8px; height: 8px; border-radius: 50%; background: #484f58; }
    .health-dot .dot.healthy { background: #3fb950; }
    .health-dot .dot.unhealthy { background: #f85149; }
    .header-right { display: flex; align-items: center; gap: 12px; }
    .model-select { background: #21262d; color: #c9d1d9; border: 1px solid #30363d; border-radius: 6px; padding: 4px 8px; font-size: 12px; }
    .cost-display { font-size: 12px; color: #8b949e; }

    /* Chat area */
    .chat-container { flex: 1; overflow-y: auto; padding: 16px; }
    .message { margin-bottom: 16px; max-width: 800px; }
    .message.user { }
    .message.user .msg-content { background: #1f6feb; color: #fff; padding: 10px 14px; border-radius: 12px 12px 4px 12px; display: inline-block; }
    .message.assistant .msg-content { background: #161b22; border: 1px solid #30363d; padding: 12px 16px; border-radius: 4px 12px 12px 12px; }
    .message.assistant .msg-content pre { background: #0d1117; padding: 12px; border-radius: 6px; overflow-x: auto; margin: 8px 0; }
    .message.assistant .msg-content code { font-family: 'JetBrains Mono', monospace; font-size: 13px; }
    .message.assistant .msg-content p { margin: 6px 0; line-height: 1.5; }
    .message.system { text-align: center; }
    .message.system .msg-content { background: none; color: #8b949e; font-size: 12px; font-style: italic; }

    /* Tool activity */
    .tool-activity { font-size: 11px; color: #8b949e; padding: 4px 0; display: flex; align-items: center; gap: 6px; }
    .tool-activity .spinner { width: 12px; height: 12px; border: 2px solid #30363d; border-top: 2px solid #58a6ff; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Prompt starters */
    .starters { display: flex; flex-wrap: wrap; gap: 8px; padding: 16px; justify-content: center; }
    .starter-card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 12px 16px; cursor: pointer; max-width: 280px; transition: border-color 0.2s; }
    .starter-card:hover { border-color: #58a6ff; }
    .starter-card .title { font-size: 13px; font-weight: 600; color: #c9d1d9; margin-bottom: 4px; }
    .starter-card .desc { font-size: 11px; color: #8b949e; }

    /* Input area */
    .input-area { padding: 12px 16px; background: #161b22; border-top: 1px solid #30363d; }
    .input-row { display: flex; gap: 8px; align-items: flex-end; }
    .input-row textarea { flex: 1; background: #0d1117; color: #c9d1d9; border: 1px solid #30363d; border-radius: 8px; padding: 10px 12px; font-family: 'Inter', sans-serif; font-size: 14px; resize: none; min-height: 44px; max-height: 200px; }
    .input-row textarea:focus { outline: none; border-color: #58a6ff; }
    .send-btn { background: #238636; color: #fff; border: none; border-radius: 8px; padding: 10px 20px; font-size: 14px; cursor: pointer; font-weight: 500; }
    .send-btn:hover { background: #2ea043; }
    .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Action buttons */
    .actions { display: flex; gap: 8px; margin-top: 8px; }
    .action-btn { background: #21262d; color: #8b949e; border: 1px solid #30363d; border-radius: 6px; padding: 6px 12px; font-size: 12px; cursor: pointer; }
    .action-btn:hover { color: #c9d1d9; border-color: #484f58; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <span class="header-title">Washmen Ops</span>
      <div class="health-bar" id="health-bar">
        <div class="health-dot"><span class="dot" id="health-frontend"></span> Frontend</div>
        <div class="health-dot"><span class="dot" id="health-gateway"></span> Gateway</div>
        <div class="health-dot"><span class="dot" id="health-core"></span> Core</div>
      </div>
    </div>
    <div class="header-right">
      <select class="model-select" id="model-select">
        <option value="sonnet">Sonnet</option>
        <option value="opus">Opus</option>
      </select>
      <span class="cost-display" id="cost-display">$0.00 / $20.00</span>
    </div>
  </div>

  <div class="chat-container" id="chat">
    <div class="starters" id="starters"></div>
  </div>

  <div class="input-area">
    <div class="input-row">
      <textarea id="input" placeholder="What would you like to build?" rows="1"></textarea>
      <button class="send-btn" id="send-btn">Send</button>
    </div>
    <div class="actions">
      <button class="action-btn" id="btn-undo">Undo Last Change</button>
      <button class="action-btn" id="btn-restart">Restart Services</button>
      <button class="action-btn" id="btn-mvp-notes">Generate MVP Notes</button>
    </div>
  </div>

  <script>
    const chat = document.getElementById('chat');
    const input = document.getElementById('input');
    const sendBtn = document.getElementById('send-btn');
    const starters = document.getElementById('starters');
    const modelSelect = document.getElementById('model-select');
    const costDisplay = document.getElementById('cost-display');

    let ws;
    let currentSessionId = null;
    let isStreaming = false;
    let currentAssistantEl = null;
    let currentAssistantText = '';

    // Connect WebSocket
    function connect() {
      const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(`${protocol}//${location.host}/ws`);

      ws.onopen = () => {
        console.log('Connected to vibe-ui');
        checkHealth();
        loadPromptStarters();
        loadChatHistory();
      };

      ws.onmessage = (event) => {
        const msg = JSON.parse(event.data);
        handleMessage(msg);
      };

      ws.onclose = () => {
        console.log('Disconnected — reconnecting in 2s');
        setTimeout(connect, 2000);
      };
    }

    function handleMessage(msg) {
      if (msg.type === 'assistant_chunk') {
        if (!currentAssistantEl) {
          currentAssistantEl = addMessage('assistant', '');
          currentAssistantText = '';
        }
        currentAssistantText += msg.text;
        currentAssistantEl.querySelector('.msg-content').innerHTML = marked.parse(currentAssistantText);
        currentAssistantEl.querySelectorAll('pre code').forEach(b => hljs.highlightElement(b));
        chat.scrollTop = chat.scrollHeight;
        if (msg.sessionId) currentSessionId = msg.sessionId;
      }
      else if (msg.type === 'assistant_done') {
        isStreaming = false;
        sendBtn.disabled = false;
        currentAssistantEl = null;
        if (msg.totalCost !== undefined) {
          costDisplay.textContent = `$${msg.totalCost.toFixed(2)} / $20.00`;
        }
      }
      else if (msg.type === 'assistant') {
        addMessage('assistant', msg.text);
      }
      else if (msg.type === 'tool_activity') {
        addToolActivity(msg.tool, msg.input);
      }
      else if (msg.type === 'tool_complete') {
        removeToolActivity();
      }
      else if (msg.type === 'system') {
        addMessage('system', msg.text);
      }
      else if (msg.type === 'error') {
        addMessage('system', `Error: ${msg.text}`);
        isStreaming = false;
        sendBtn.disabled = false;
      }
      else if (msg.type === 'undo_result') {
        addMessage('system', `Undo: ${JSON.stringify(msg.results)}`);
      }
      else if (msg.type === 'checkpoint_created') {
        addMessage('system', `Checkpoint created: ${msg.name}`);
      }
      else if (msg.type === 'model_changed') {
        addMessage('system', `Model switched to ${msg.model}`);
      }
    }

    function addMessage(role, text) {
      // Hide starters on first message
      if (starters.style.display !== 'none') starters.style.display = 'none';

      const div = document.createElement('div');
      div.className = `message ${role}`;
      const content = document.createElement('div');
      content.className = 'msg-content';
      if (role === 'assistant') {
        content.innerHTML = marked.parse(text || '');
        content.querySelectorAll('pre code').forEach(b => hljs.highlightElement(b));
      } else {
        content.textContent = text;
      }
      div.appendChild(content);
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
      return div;
    }

    let currentToolEl = null;
    function addToolActivity(tool, input) {
      if (currentToolEl) currentToolEl.remove();
      currentToolEl = document.createElement('div');
      currentToolEl.className = 'tool-activity';
      const label = tool === 'Bash' ? `Running: ${(input?.command || '').slice(0, 60)}` :
                    tool === 'Edit' ? `Editing: ${(input?.file_path || '').split('/').pop()}` :
                    tool === 'Read' ? `Reading: ${(input?.file_path || '').split('/').pop()}` :
                    `${tool}...`;
      currentToolEl.innerHTML = `<span class="spinner"></span> ${label}`;
      chat.appendChild(currentToolEl);
      chat.scrollTop = chat.scrollHeight;
    }
    function removeToolActivity() {
      if (currentToolEl) { currentToolEl.remove(); currentToolEl = null; }
    }

    function sendMessage(text) {
      if (!text.trim() || isStreaming) return;
      addMessage('user', text);
      isStreaming = true;
      sendBtn.disabled = true;
      ws.send(JSON.stringify({
        type: 'chat',
        text: text,
        sessionId: currentSessionId,
        model: modelSelect.value,
      }));
      input.value = '';
      input.style.height = 'auto';
    }

    // Health check
    async function checkHealth() {
      try {
        const resp = await fetch('/api/service-health');
        const data = await resp.json();
        for (const svc of data.services) {
          const dot = document.getElementById(`health-${svc.name === 'api-gateway' ? 'gateway' : svc.name === 'core-service' ? 'core' : 'frontend'}`);
          if (dot) dot.className = `dot ${svc.status}`;
        }
      } catch {}
    }
    setInterval(checkHealth, 15000);

    // Load prompt starters
    async function loadPromptStarters() {
      try {
        const resp = await fetch('/api/prompts');
        const data = await resp.json();
        starters.innerHTML = '';
        for (const s of data.starters) {
          const card = document.createElement('div');
          card.className = 'starter-card';
          card.innerHTML = `<div class="title">${s.title}</div><div class="desc">${s.prompt.slice(0, 80)}...</div>`;
          card.onclick = () => {
            input.value = s.prompt;
            input.focus();
          };
          starters.appendChild(card);
        }
      } catch {}
    }

    // Load chat history
    async function loadChatHistory() {
      try {
        const resp = await fetch('/api/sessions');
        const sessions = await resp.json();
        if (sessions.length > 0) {
          const latest = sessions[0];
          currentSessionId = latest.id;
          const msgResp = await fetch(`/api/sessions/${latest.id}/messages`);
          const messages = await msgResp.json();
          if (messages.length > 0) {
            starters.style.display = 'none';
            for (const m of messages) {
              try {
                const parsed = JSON.parse(m.content);
                addMessage(m.role, parsed.text || '');
              } catch {
                addMessage(m.role, m.content);
              }
            }
          }
        }
      } catch {}
    }

    // Cost check
    async function loadCost() {
      try {
        const resp = await fetch('/api/cost');
        const data = await resp.json();
        costDisplay.textContent = `$${data.totalCost.toFixed(2)} / $${data.dailyBudget.toFixed(2)}`;
      } catch {}
    }
    loadCost();

    // Event handlers
    sendBtn.onclick = () => sendMessage(input.value);
    input.onkeydown = (e) => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(input.value); }
    };
    input.oninput = () => {
      input.style.height = 'auto';
      input.style.height = Math.min(input.scrollHeight, 200) + 'px';
    };

    modelSelect.onchange = () => {
      if (ws && ws.readyState === 1) {
        ws.send(JSON.stringify({ type: 'set_model', model: modelSelect.value }));
      }
    };

    document.getElementById('btn-undo').onclick = () => {
      if (confirm('Undo last change? This will revert all repos to the previous checkpoint.')) {
        ws.send(JSON.stringify({ type: 'undo' }));
      }
    };
    document.getElementById('btn-restart').onclick = () => {
      ws.send(JSON.stringify({ type: 'restart_services' }));
    };
    document.getElementById('btn-mvp-notes').onclick = () => {
      ws.send(JSON.stringify({ type: 'generate_mvp_notes' }));
    };

    connect();
  </script>
</body>
</html>
