<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Washmen Ops</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link id="hljs-theme" rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    /* ── Tokens ── */
    :root {
      --font: 'DM Sans', system-ui, sans-serif;
      --mono: 'JetBrains Mono', monospace;
      --bg-0: #09090b; --bg-1: #111113; --bg-2: #18181b; --bg-3: #27272a;
      --border: #27272a; --border-subtle: #1e1e21;
      --text-0: #fafafa; --text-1: #a1a1aa; --text-2: #71717a;
      --accent: #6366f1; --accent-soft: rgba(99,102,241,.12);
      --green: #22c55e; --green-soft: rgba(34,197,94,.12);
      --red: #ef4444; --orange: #f59e0b;
      --blue: #3b82f6; --purple: #a855f7;
      --radius: 10px; --radius-sm: 6px;
      --shadow: 0 1px 3px rgba(0,0,0,.4);
      --transition: .15s cubic-bezier(.4,0,.2,1);
    }
    [data-theme="light"] {
      --bg-0: #ffffff; --bg-1: #f9fafb; --bg-2: #f3f4f6; --bg-3: #e5e7eb;
      --border: #e5e7eb; --border-subtle: #f3f4f6;
      --text-0: #111827; --text-1: #6b7280; --text-2: #9ca3af;
      --accent: #4f46e5; --accent-soft: rgba(79,70,229,.08);
      --green: #16a34a; --green-soft: rgba(22,163,74,.08);
      --red: #dc2626; --orange: #d97706; --blue: #2563eb; --purple: #7c3aed;
      --shadow: 0 1px 3px rgba(0,0,0,.08);
    }

    /* ── Reset ── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: var(--font); background: var(--bg-0); color: var(--text-0); height: 100vh; overflow: hidden; display: flex; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--bg-3); border-radius: 3px; }

    /* ── Session Rail ── */
    .rail { width: 52px; background: var(--bg-1); border-right: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; padding: 12px 0; gap: 4px; flex-shrink: 0; }
    .rail.expanded { width: 220px; align-items: stretch; padding: 12px 10px; }
    .rail-btn { width: 36px; height: 36px; border-radius: var(--radius-sm); border: none; background: transparent; color: var(--text-1); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all var(--transition); font-size: 16px; }
    .rail-btn:hover, .rail-btn.active { background: var(--accent-soft); color: var(--accent); }
    .rail-divider { width: 24px; height: 1px; background: var(--border); margin: 4px 0; }
    .rail.expanded .rail-divider { width: 100%; }
    .session-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 2px; margin-top: 8px; }
    .rail:not(.expanded) .session-list { display: none; }
    .rail:not(.expanded) .session-label { display: none; }
    .session-item { padding: 7px 10px; border-radius: var(--radius-sm); cursor: pointer; font-size: 12px; color: var(--text-1); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; transition: all var(--transition); }
    .session-item:hover { background: var(--bg-3); color: var(--text-0); }
    .session-item.active { background: var(--accent-soft); color: var(--accent); }
    .session-label { font-size: 10px; text-transform: uppercase; letter-spacing: .6px; color: var(--text-2); padding: 0 10px; margin-top: 8px; }
    .new-sess { width: 36px; height: 36px; border-radius: var(--radius-sm); border: 1px dashed var(--border); background: transparent; color: var(--text-2); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; transition: all var(--transition); }
    .new-sess:hover { border-color: var(--accent); color: var(--accent); }
    .rail.expanded .new-sess { width: 100%; height: 32px; font-size: 12px; }
    .rail.expanded .new-sess::after { content: ' New chat'; font-size: 12px; margin-left: 6px; }

    /* ── Layout Shell ── */
    .shell { flex: 1; display: flex; flex-direction: column; min-width: 0; }
    .topbar { height: 48px; background: var(--bg-1); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 16px; flex-shrink: 0; }
    .topbar-left { display: flex; align-items: center; gap: 14px; }
    .topbar-brand { font-size: 15px; font-weight: 700; letter-spacing: -.3px; color: var(--text-0); }
    .topbar-brand span { color: var(--accent); }
    .health { display: flex; gap: 10px; }
    .health-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text-2); }
    .health-item .hd { width: 7px; height: 7px; border-radius: 50%; background: var(--bg-3); }
    .health-item .hd.ok { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .health-item .hd.err { background: var(--red); box-shadow: 0 0 6px var(--red); }
    .topbar-right { display: flex; align-items: center; gap: 10px; }
    .pill { display: flex; border-radius: 6px; overflow: hidden; border: 1px solid var(--border); background: var(--bg-2); }
    .pill button { padding: 3px 12px; border: none; background: transparent; color: var(--text-2); font-size: 11px; font-weight: 600; font-family: var(--font); cursor: pointer; transition: all var(--transition); }
    .pill button.on { background: var(--accent); color: #fff; }
    .cost-chip { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text-2); }
    .cost-bar-track { width: 48px; height: 3px; background: var(--bg-3); border-radius: 2px; overflow: hidden; }
    .cost-bar-fill { height: 100%; background: var(--green); border-radius: 2px; transition: width .3s, background .3s; }
    .cost-bar-fill.warn { background: var(--orange); }
    .cost-bar-fill.crit { background: var(--red); }
    .icon-btn { width: 32px; height: 32px; border-radius: var(--radius-sm); border: none; background: transparent; color: var(--text-2); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all var(--transition); }
    .icon-btn:hover { background: var(--bg-3); color: var(--text-0); }

    /* ── Split Pane ── */
    .workspace { flex: 1; display: flex; overflow: hidden; }
    .chat-pane { display: flex; flex-direction: column; background: var(--bg-0); min-width: 320px; }
    .resize-handle { width: 5px; cursor: col-resize; background: var(--border); position: relative; flex-shrink: 0; transition: background var(--transition); z-index: 5; }
    .resize-handle:hover, .resize-handle.dragging { background: var(--accent); }
    .resize-handle::after { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 3px; height: 32px; border-radius: 2px; background: var(--text-2); opacity: 0; transition: opacity var(--transition); }
    .resize-handle:hover::after { opacity: .4; }
    .preview-pane { flex: 1; display: flex; flex-direction: column; background: var(--bg-1); min-width: 320px; }

    /* ── Chat ── */
    .chat-scroll { flex: 1; overflow-y: auto; padding: 20px 16px; }
    .welcome-block { text-align: center; padding: 48px 16px 16px; }
    .welcome-block h2 { font-size: 20px; font-weight: 700; letter-spacing: -.4px; margin-bottom: 6px; }
    .welcome-block p { font-size: 13px; color: var(--text-1); max-width: 380px; margin: 0 auto 20px; line-height: 1.55; }
    .starters { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; max-width: 420px; margin: 0 auto; }
    .s-card { background: var(--bg-2); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; cursor: pointer; text-align: left; transition: all var(--transition); }
    .s-card:hover { border-color: var(--accent); background: var(--accent-soft); }
    .s-card .s-t { font-size: 12px; font-weight: 600; margin-bottom: 3px; color: var(--text-0); }
    .s-card .s-d { font-size: 11px; color: var(--text-2); line-height: 1.35; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .turn { margin-bottom: 20px; }
    .msg { margin-bottom: 6px; max-width: 100%; animation: msg-in .25s ease; }
    @keyframes msg-in { from { opacity: 0; transform: translateY(6px); } }
    .msg.user .mc { background: var(--accent); color: #fff; padding: 10px 14px; border-radius: 14px 14px 4px 14px; display: inline-block; font-size: 13.5px; line-height: 1.5; }
    .msg.user .mc p { margin: 0; }
    .msg.user .mc code { background: rgba(255,255,255,.18); padding: 1px 5px; border-radius: 3px; font-family: var(--mono); font-size: 12px; }
    .msg.assistant .mc { background: var(--bg-2); border: 1px solid var(--border); padding: 14px 16px; border-radius: 4px 14px 14px 14px; font-size: 13.5px; line-height: 1.6; }
    .msg.assistant .mc p { margin: 5px 0; }
    .msg.assistant .mc pre { background: var(--bg-0); padding: 12px; border-radius: var(--radius-sm); overflow-x: auto; margin: 10px 0; position: relative; border: 1px solid var(--border); }
    .msg.assistant .mc code { font-family: var(--mono); font-size: 12.5px; }
    .msg.assistant .mc ul, .msg.assistant .mc ol { margin: 6px 0 6px 18px; }
    .msg.assistant .mc li { margin: 3px 0; }
    .msg.system .mc { text-align: center; color: var(--text-2); font-size: 11px; font-style: italic; }
    .code-copy { position: absolute; top: 6px; right: 6px; background: var(--bg-3); border: 1px solid var(--border); border-radius: 4px; color: var(--text-2); cursor: pointer; font-size: 10px; padding: 2px 8px; opacity: 0; transition: opacity var(--transition); font-family: var(--font); }
    pre:hover .code-copy { opacity: 1; }
    .code-copy.copied { color: var(--green); }
    .thinking { display: flex; align-items: center; gap: 8px; padding: 6px 0; color: var(--text-2); font-size: 12px; animation: msg-in .2s ease; }
    .thinking-dots { display: flex; gap: 3px; }
    .thinking-dots span { width: 5px; height: 5px; background: var(--accent); border-radius: 50%; animation: bounce 1.4s infinite; }
    .thinking-dots span:nth-child(2) { animation-delay: .16s; }
    .thinking-dots span:nth-child(3) { animation-delay: .32s; }
    @keyframes bounce { 0%,80%,100% { transform: translateY(0); } 40% { transform: translateY(-6px); } }
    .tool-act { font-size: 11px; color: var(--text-2); padding: 3px 0; display: flex; align-items: center; gap: 5px; animation: msg-in .15s ease; }
    .tool-act .sp { width: 11px; height: 11px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Input ── */
    .input-dock { padding: 12px 14px 10px; border-top: 1px solid var(--border); background: var(--bg-1); }
    .input-row { display: flex; gap: 8px; align-items: flex-end; }
    .input-row textarea { flex: 1; background: var(--bg-0); color: var(--text-0); border: 1px solid var(--border); border-radius: var(--radius); padding: 11px 14px; font-family: var(--font); font-size: 13.5px; resize: none; min-height: 44px; max-height: 180px; line-height: 1.45; transition: border-color var(--transition); }
    .input-row textarea:focus { outline: none; border-color: var(--accent); }
    .send-pill { background: var(--accent); color: #fff; border: none; border-radius: var(--radius); padding: 10px 18px; font-size: 13px; font-weight: 600; font-family: var(--font); cursor: pointer; transition: all var(--transition); display: flex; align-items: center; gap: 5px; }
    .send-pill:hover { filter: brightness(1.12); }
    .send-pill:disabled { opacity: .35; cursor: not-allowed; }
    .send-pill svg { width: 15px; height: 15px; }
    .dock-actions { display: flex; gap: 6px; margin-top: 8px; align-items: center; }
    .dock-btn { background: var(--bg-2); color: var(--text-2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 5px 10px; font-size: 11px; font-family: var(--font); font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 5px; transition: all var(--transition); }
    .dock-btn:hover { color: var(--text-0); border-color: var(--accent); }
    .dock-btn svg { width: 13px; height: 13px; flex-shrink: 0; }
    .dock-hint { margin-left: auto; font-size: 10px; color: var(--text-2); }

    /* ── Preview Pane ── */
    .preview-toolbar { height: 42px; display: flex; align-items: center; gap: 8px; padding: 0 12px; background: var(--bg-2); border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .preview-url { flex: 1; display: flex; align-items: center; background: var(--bg-0); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 0 10px; height: 28px; gap: 6px; }
    .preview-url .lock { color: var(--green); font-size: 11px; }
    .preview-url input { flex: 1; background: none; border: none; color: var(--text-1); font-size: 12px; font-family: var(--font); outline: none; }
    .device-btns { display: flex; gap: 2px; }
    .device-btn { width: 28px; height: 28px; border-radius: var(--radius-sm); border: none; background: transparent; color: var(--text-2); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all var(--transition); }
    .device-btn:hover { background: var(--bg-3); }
    .device-btn.active { background: var(--accent-soft); color: var(--accent); }
    .preview-frame-wrap { flex: 1; display: flex; align-items: flex-start; justify-content: center; overflow: hidden; background: var(--bg-0); position: relative; }
    .preview-frame-wrap iframe { border: none; background: #fff; transition: width .3s ease, height .3s ease; }
    .preview-frame-wrap.desktop iframe { width: 100%; height: 100%; }
    .preview-frame-wrap.tablet iframe { width: 768px; height: 100%; border-radius: 8px; margin-top: 12px; box-shadow: var(--shadow); }
    .preview-frame-wrap.mobile iframe { width: 375px; height: 100%; border-radius: 12px; margin-top: 12px; box-shadow: var(--shadow); }
    .preview-loader { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: var(--bg-0); z-index: 2; }
    .preview-loader.hidden { display: none; }
    .preview-loader .ld-ring { width: 28px; height: 28px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .9s linear infinite; }
  </style>
</head>
<body>

<!-- ── Session Rail ── -->
<div class="rail" id="rail">
  <button class="rail-btn" id="rail-toggle" title="Toggle sidebar">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
  </button>
  <button class="new-sess" id="new-session" title="New chat">+</button>
  <div class="rail-divider"></div>
  <span class="session-label">Recent</span>
  <div class="session-list" id="session-list"></div>
</div>

<!-- ── Shell ── -->
<div class="shell">
  <!-- Topbar -->
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-brand"><span>W</span>ashmen Ops</div>
      <div class="health" id="health-dots">
      </div>
    </div>
    <div class="topbar-right">
      <div class="pill" id="model-pill">
        <button class="on" data-m="sonnet">Sonnet</button>
        <button data-m="opus">Opus</button>
      </div>
      <div class="cost-chip">
        <div class="cost-bar-track"><div class="cost-bar-fill" id="cost-fill"></div></div>
        <span id="cost-txt">$0</span>
      </div>
      <button class="icon-btn" id="theme-btn" title="Toggle theme">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
      </button>
    </div>
  </div>

  <!-- Split workspace -->
  <div class="workspace">
    <!-- Chat pane -->
    <div class="chat-pane" id="chat-pane" style="width:42%">
      <div class="chat-scroll" id="chat">
        <div class="welcome-block" id="welcome">
          <h2>What are you building?</h2>
          <p>Describe a feature and I'll build it across the frontend, API gateway, and core service — with live preview on the right.</p>
        </div>
        <div class="starters" id="starters"></div>
      </div>
      <div class="input-dock">
        <div class="input-row">
          <textarea id="input" placeholder="Describe what you'd like to build..." rows="1"></textarea>
          <button class="send-pill" id="send-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 2L11 13"/><path d="M22 2l-7 20-4-9-9-4z"/></svg>
          </button>
        </div>
        <div class="dock-actions">
          <button class="dock-btn" id="btn-undo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 10h10a5 5 0 015 5v2"/><path d="M3 10l4-4m-4 4l4 4"/></svg>Undo</button>
          <button class="dock-btn" id="btn-restart"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 4v6h6"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/></svg>Restart</button>
          <button class="dock-btn" id="btn-mvp"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6"/><path d="M16 13H8m8 4H8"/></svg>MVP Notes</button>
          <span class="dock-hint">Enter to send</span>
        </div>
      </div>
    </div>

    <!-- Resize handle -->
    <div class="resize-handle" id="resize-handle"></div>

    <!-- Preview pane -->
    <div class="preview-pane">
      <div class="preview-toolbar">
        <button class="icon-btn" id="preview-back" title="Back">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5m7-7l-7 7 7 7"/></svg>
        </button>
        <button class="icon-btn" id="preview-refresh" title="Refresh">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 4v6h6"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/></svg>
        </button>
        <div class="preview-url">
          <span class="lock">&#9679;</span>
          <input id="preview-url-input" value="" spellcheck="false">
        </div>
        <div class="device-btns">
          <button class="device-btn active" data-device="desktop" title="Desktop">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8m-4-4v4"/></svg>
          </button>
          <button class="device-btn" data-device="tablet" title="Tablet">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="2" width="16" height="20" rx="2"/><path d="M12 18h.01"/></svg>
          </button>
          <button class="device-btn" data-device="mobile" title="Mobile">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="2" width="14" height="20" rx="2"/><path d="M12 18h.01"/></svg>
          </button>
        </div>
      </div>
      <div class="preview-frame-wrap desktop" id="preview-wrap">
        <div class="preview-loader" id="preview-loader"><div class="ld-ring"></div></div>
        <iframe id="preview-frame" src="about:blank"></iframe>
      </div>
    </div>
  </div>
</div>

<script>
/* ═══ State ═══ */
const $ = s => document.getElementById(s);
const chat = $('chat'), input = $('input'), sendBtn = $('send-btn');
const welcome = $('welcome'), starters = $('starters');
const costTxt = $('cost-txt'), costFill = $('cost-fill');
const previewFrame = $('preview-frame'), previewWrap = $('preview-wrap');
const previewLoader = $('preview-loader');

let ws, sid = null, streaming = false, model = 'sonnet';
let assistEl = null, assistTxt = '', turnEl = null, thinkEl = null, toolEl = null;
let hasSent = false;

/* ═══ Port URL resolver ═══ */
// In Codespaces: hostname is <codespace>-<port>.app.github.dev
// Locally: just use localhost:<port>
function portUrl(port) {
  const host = location.hostname;
  // Codespace pattern: <name>-<currentPort>.app.github.dev
  const csMatch = host.match(/^(.+)-(\d+)(\.app\.github\.dev)$/);
  if (csMatch) {
    return location.protocol + '//' + csMatch[1] + '-' + port + csMatch[3];
  }
  // Gitpod pattern: <port>-<workspace>.gitpod.io
  const gpMatch = host.match(/^(\d+)-(.+)(\.gitpod\.io)$/);
  if (gpMatch) {
    return location.protocol + '//' + port + '-' + gpMatch[2] + gpMatch[3];
  }
  // Local
  return 'http://localhost:' + port;
}

const previewBaseUrl = portUrl(3000);
$('preview-url-input').value = previewBaseUrl.replace(/^https?:\/\//, '');
previewFrame.src = previewBaseUrl;

/* ═══ Preview ═══ */
previewFrame.onload = () => previewLoader.classList.add('hidden');
$('preview-refresh').onclick = () => { previewLoader.classList.remove('hidden'); previewFrame.src = previewFrame.src; };
$('preview-back').onclick = () => { try { previewFrame.contentWindow.history.back(); } catch {} };
$('preview-url-input').onkeydown = e => {
  if (e.key === 'Enter') {
    let url = e.target.value.trim();
    // If user types a port number like "3000" or "localhost:3000", resolve it
    const portOnly = url.match(/^(\d{4,5})$/);
    if (portOnly) { url = portUrl(portOnly[1]); }
    else if (url.match(/^localhost:\d+/)) { url = portUrl(url.split(':')[1]); }
    else if (!url.startsWith('http')) url = 'http://' + url;
    previewLoader.classList.remove('hidden');
    previewFrame.src = url;
  }
};
document.querySelectorAll('.device-btn').forEach(b => b.onclick = () => {
  document.querySelectorAll('.device-btn').forEach(x => x.classList.remove('active'));
  b.classList.add('active');
  previewWrap.className = 'preview-frame-wrap ' + b.dataset.device;
});

/* ═══ Resize handle ═══ */
{
  const handle = $('resize-handle'), pane = $('chat-pane');
  let dragging = false, startX, startW;
  handle.onmousedown = e => { dragging = true; startX = e.clientX; startW = pane.offsetWidth; handle.classList.add('dragging'); document.body.style.cursor = 'col-resize'; document.body.style.userSelect = 'none'; };
  document.onmousemove = e => { if (!dragging) return; const w = Math.max(320, Math.min(startW + (e.clientX - startX), window.innerWidth - 400)); pane.style.width = w + 'px'; };
  document.onmouseup = () => { if (dragging) { dragging = false; handle.classList.remove('dragging'); document.body.style.cursor = ''; document.body.style.userSelect = ''; } };
}

/* ═══ Rail ═══ */
$('rail-toggle').onclick = () => $('rail').classList.toggle('expanded');
$('new-session').onclick = () => { sid = null; hasSent = false; chat.innerHTML = ''; chat.append(welcome, starters); welcome.style.display = ''; starters.style.display = ''; loadStarters(); };

/* ═══ Theme ═══ */
const savedTheme = localStorage.getItem('theme') || 'dark';
document.documentElement.dataset.theme = savedTheme;
$('theme-btn').onclick = () => {
  const t = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
  document.documentElement.dataset.theme = t;
  localStorage.setItem('theme', t);
  $('hljs-theme').href = t === 'dark' ? 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css' : 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css';
};

/* ═══ Model pill ═══ */
$('model-pill').onclick = e => {
  const b = e.target.closest('button'); if (!b || b.classList.contains('on')) return;
  $('model-pill').querySelectorAll('button').forEach(x => x.classList.remove('on'));
  b.classList.add('on'); model = b.dataset.m;
  if (ws?.readyState === 1) ws.send(JSON.stringify({ type: 'set_model', model }));
};

/* ═══ WebSocket ═══ */
function connect() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}/ws?token=${window.__VIBE_TOKEN}`);
  ws.onopen = () => { checkHealth(); loadStarters(); loadSessions(); loadHistory(); };
  ws.onmessage = e => handle(JSON.parse(e.data));
  ws.onclose = () => setTimeout(connect, 2000);
}

function handle(m) {
  if (m.type === 'thinking') showThinking();
  else if (m.type === 'thinking_done') hideThinking();
  else if (m.type === 'assistant_chunk') {
    hideThinking();
    if (!assistEl) { assistEl = addMsg('assistant', ''); assistTxt = ''; }
    assistTxt += m.text;
    const mc = assistEl.querySelector('.mc');
    mc.innerHTML = marked.parse(assistTxt);
    copyBtns(mc); mc.querySelectorAll('pre code').forEach(b => hljs.highlightElement(b));
    chat.scrollTop = chat.scrollHeight;
    if (m.sessionId) sid = m.sessionId;
    // Auto-refresh preview after code changes
    clearTimeout(handle._refreshTimer);
    handle._refreshTimer = setTimeout(() => { previewLoader.classList.remove('hidden'); previewFrame.src = previewFrame.src; }, 2000);
  }
  else if (m.type === 'assistant_done') { hideThinking(); streaming = false; sendBtn.disabled = false; assistEl = null; turnEl = null; updateCost(m.totalCost); loadSessions(); }
  else if (m.type === 'assistant') addMsg('assistant', m.text);
  else if (m.type === 'tool_activity') showTool(m.tool, m.input);
  else if (m.type === 'tool_complete') hideTool();
  else if (m.type === 'system') addMsg('system', m.text);
  else if (m.type === 'error') { hideThinking(); addMsg('system', 'Error: ' + m.text); streaming = false; sendBtn.disabled = false; }
  else if (m.type === 'undo_result') addMsg('system', 'Undo complete');
  else if (m.type === 'checkpoint_created') addMsg('system', 'Checkpoint: ' + m.name);
  else if (m.type === 'model_changed') addMsg('system', 'Model: ' + m.model);
}

/* ═══ Thinking ═══ */
function showThinking() { if (thinkEl) return; thinkEl = document.createElement('div'); thinkEl.className = 'thinking'; thinkEl.innerHTML = '<div class="thinking-dots"><span></span><span></span><span></span></div> Thinking\u2026'; chat.append(thinkEl); chat.scrollTop = chat.scrollHeight; }
function hideThinking() { thinkEl?.remove(); thinkEl = null; }

/* ═══ Tools ═══ */
function showTool(t, inp) {
  hideTool(); toolEl = document.createElement('div'); toolEl.className = 'tool-act';
  const icons = { Bash:'\u2699', Edit:'\u270E', Write:'\u270E', Read:'\uD83D\uDCC4', Glob:'\uD83D\uDD0D', Grep:'\uD83D\uDD0D' };
  const lbl = t==='Bash' ? (inp?.command||'').slice(0,70) : t==='Edit'||t==='Write' ? 'Editing '+(inp?.file_path||'').split('/').pop() : t==='Read' ? 'Reading '+(inp?.file_path||'').split('/').pop() : t;
  toolEl.innerHTML = `<span class="sp"></span>${icons[t]||'\u26A1'} ${lbl}`; chat.append(toolEl); chat.scrollTop = chat.scrollHeight;
}
function hideTool() { toolEl?.remove(); toolEl = null; }

/* ═══ Messages ═══ */
function addMsg(role, text) {
  if (role === 'user' && !hasSent) { hasSent = true; welcome.style.display = 'none'; starters.style.display = 'none'; }
  if (role === 'user') { turnEl = document.createElement('div'); turnEl.className = 'turn'; chat.append(turnEl); }
  const box = turnEl || chat;
  const d = document.createElement('div'); d.className = 'msg ' + role;
  const mc = document.createElement('div'); mc.className = 'mc';
  if (role === 'assistant' || role === 'user') { mc.innerHTML = marked.parse(text || ''); copyBtns(mc); mc.querySelectorAll('pre code').forEach(b => hljs.highlightElement(b)); }
  else mc.textContent = text;
  d.append(mc); box.append(d); chat.scrollTop = chat.scrollHeight; return d;
}

/* ═══ Copy ═══ */
function copyBtns(el) {
  el.querySelectorAll('pre').forEach(pre => {
    if (pre.querySelector('.code-copy')) return;
    const b = document.createElement('button'); b.className = 'code-copy'; b.textContent = 'Copy';
    b.onclick = () => { navigator.clipboard.writeText(pre.textContent.replace(/Copy(ed!)?/,'').trim()); b.textContent = 'Copied!'; b.classList.add('copied'); setTimeout(() => { b.textContent = 'Copy'; b.classList.remove('copied'); }, 1500); };
    pre.style.position = 'relative'; pre.append(b);
  });
}

/* ═══ Cost ═══ */
let _budget = 30;
function updateCost(c, b) { if (b) _budget = b; if (c == null) return; const p = Math.min(c/_budget*100,100); costTxt.textContent = '$'+c.toFixed(2); costFill.style.width = p+'%'; costFill.className = 'cost-bar-fill'+(p>80?' crit':p>50?' warn':''); }

/* ═══ Send ═══ */
function send(t) { if (!t.trim() || streaming) return; addMsg('user',t); streaming = true; sendBtn.disabled = true; ws.send(JSON.stringify({type:'chat',text:t,sessionId:sid,model})); input.value=''; input.style.height='auto'; }

/* ═══ Health ═══ */
async function checkHealth() {
  try { const d = await (await fetch('/api/service-health')).json(); const c = document.getElementById('health-dots'); if(c && d.services) { c.innerHTML=''; d.services.forEach(s => { const ok=s.status==='healthy'; const item=document.createElement('div'); item.className='health-item'; item.innerHTML=`<span class="hd ${ok?'ok':'err'}"></span>${s.name}`; c.appendChild(item); }); } } catch {}
}
setInterval(checkHealth, 15000);

/* ═══ Starters ═══ */
const sIcons = ['\uD83D\uDCCA','\uD83D\uDD0D','\uD83D\uDCDD','\u26A1','\u2795','\uD83D\uDD17'];
async function loadStarters() {
  try { const d = await (await fetch('/api/prompts')).json(); starters.innerHTML = '';
    d.starters.forEach((s,i) => { const c = document.createElement('div'); c.className = 's-card'; c.innerHTML = `<div class="s-t">${sIcons[i]||'\u26A1'} ${s.title}</div><div class="s-d">${s.prompt.slice(0,80)}\u2026</div>`; c.onclick = () => { input.value = s.prompt; input.focus(); input.dispatchEvent(new Event('input')); }; starters.append(c); });
  } catch {}
}

/* ═══ Sessions ═══ */
async function loadSessions() {
  try { const ss = await (await fetch('/api/sessions')).json(); const list = $('session-list'); list.innerHTML = '';
    ss.forEach(s => { const el = document.createElement('div'); el.className = 'session-item'+(s.id===sid?' active':''); el.textContent = s.title||s.project_name||'Chat'; el.onclick = () => loadSession(s.id); list.append(el); });
  } catch {}
}
async function loadSession(id) {
  try { const msgs = await (await fetch('/api/sessions/'+id+'/messages')).json(); sid = id; hasSent = false; chat.innerHTML = ''; chat.append(welcome, starters);
    if (msgs.length) { welcome.style.display='none'; starters.style.display='none'; hasSent=true; msgs.forEach(m => { try { addMsg(m.role, JSON.parse(m.content).text||''); } catch { addMsg(m.role, m.content); } }); }
    loadSessions();
  } catch {}
}
async function loadHistory() { try { const ss = await (await fetch('/api/sessions')).json(); if (ss.length) await loadSession(ss[0].id); } catch {} }

/* ═══ Init cost ═══ */
(async () => { try { const d = await (await fetch('/api/cost')).json(); updateCost(d.totalCost); } catch {} })();

/* ═══ Events ═══ */
sendBtn.onclick = () => send(input.value);
input.onkeydown = e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(input.value); } };
input.oninput = () => { input.style.height = 'auto'; input.style.height = Math.min(input.scrollHeight, 180) + 'px'; };
$('btn-undo').onclick = () => { if (confirm('Revert to last checkpoint?')) ws.send(JSON.stringify({type:'undo'})); };
$('btn-restart').onclick = () => ws.send(JSON.stringify({type:'restart_services'}));
$('btn-mvp').onclick = () => ws.send(JSON.stringify({type:'generate_mvp_notes'}));

connect();
</script>
